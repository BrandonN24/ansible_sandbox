---

- hosts: all
  become: true
  tasks:

  - name: update repository index
    apt:
      update_cache: yes
    when: ansible_distribution == "Ubuntu"

  - name: install apache2 package
    apt:
      name: apache2
      state: latest
    when: ansible_distribution == "Ubuntu"

  - name: add php support for apache
    apt:
      name: libapache2-mod-php
      state: latest
    when: ansible_distribution == "Ubuntu"

  - name: update repository index for RHEL
    yum:
      update_cache: yes
    when: ansible_distribution == "rhel"

  - name: install apache2 package for RHEL
    yum:
      name: httpd
      state: latest
    when: ansible_distribution == "rhel"

  - name: add php support for apache for RHEL
    yum:
      name: php
      state: latest
    when: ansible_distribution == "rhel"

